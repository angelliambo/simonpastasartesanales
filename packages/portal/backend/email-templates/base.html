<!DOCTYPE html
  PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{siteName}}</title>
  <style type="text/css">
    /* Reset styles to ensure email client consistency */
    body,
    table,
    td,
    a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

    table,
    td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }

    img {
      -ms-interpolation-mode: bicubic;
    }

    /* Outlaws margins/paddings */
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0b091a;
    }

    table {
      border-collapse: collapse;
    }

    /* Client-specific styles */
    /* Gmail Android app font scaling reset */
    div[style*="margin: 16px 0;"] {
      margin: 0;
    }
  </style>
</head>

<body style="margin: 0; padding: 0; width: 100% !important; min-width: 100% !important; background-color: #0b091a;">
  <div style="background-color: #0b091a; width: 100% !important; min-width: 100% !important; margin: 0; padding: 0;">
    <!-- Outer Wrapper Table -->
    <table border="0" cellpadding="0" cellspacing="0" width="100%" height="100%"
      style="background-color: #0b091a; table-layout: fixed; width: 100% !important; min-width: 100% !important;">
      <tr>
        <td align="center" valign="top" style="padding: 40px 16px;">

          <!-- Main Card Table -->
          <table border="0" cellpadding="0" cellspacing="0" width="100%"
            style="max-width: 520px; background-color: #0e0d26; border-radius: 24px; border: 1px solid #25224e; overflow: hidden; border-collapse: separate; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">

            <!-- TOP SPACING -->
            <tr>
              <td>
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td height="32" style="font-size: 0px; line-height: 0px; height: 32px;">&nbsp;</td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- HEADER SECTION (Logo & Brand) -->
            <tr>
              <td align="center" valign="top" style="padding: 0 32px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td align="center">

                      <!-- Radial Glow Container for Logo -->
                      <table border="0" cellpadding="0" cellspacing="0"
                        style="background-color: #0e0d26; background-image: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, rgba(14, 13, 38, 0) 70%); border-radius: 50%;">
                        <tr>
                          <td align="center" valign="middle" style="padding: 16px;">
                            <!-- Rounded Dark Blue Square Brand Logo represented by a div -->
                            <div
                              style="width: 72px; height: 72px; background-color: #161432; border: 1px solid #2d2a58; border-radius: 18px; text-align: center;">
                              <span
                                style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 800; color: #ffffff; line-height: 70px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); display: block;">
                                ⚡
                              </span>
                            </div>
                          </td>
                        </tr>
                      </table>

                    </td>
                  </tr>

                  <!-- logo-to-brand spacing -->
                  <tr>
                    <td height="12" style="font-size: 0px; line-height: 0px; height: 12px;">&nbsp;</td>
                  </tr>

                  <tr>
                    <td align="center"
                      style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 800; color: #a78bfa; letter-spacing: -0.5px;">
                      <span style="background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: #ffffff;">{{siteName}}</span>
                    </td>
                  </tr>

                  <!-- brand-to-stars spacing -->
                  <tr>
                    <td height="8" style="font-size: 0px; line-height: 0px; height: 8px;">&nbsp;</td>
                  </tr>

                  <tr>
                    <td align="center"
                      style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 8px; color: #3d3973; letter-spacing: 6px; text-transform: uppercase;">
                      ✦ ✦ ✦ ✦ ✦
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- HEADER TO BODY SEPARATION (24px) -->
            <tr>
              <td>
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td height="24" style="font-size: 0px; line-height: 0px; height: 24px;">&nbsp;</td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- BODY SECTION (Title & Content) -->
            <tr>
              <td align="left" valign="top" style="padding: 0 32px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <!-- Email Title -->
                  <tr>
                    <td align="center"
                      style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; color: #ffffff; line-height: 1.4; padding-bottom: 16px;">
                      {{titulo}}
                    </td>
                  </tr>
                  <!-- Email Content -->
                  <tr>
                    <td
                      style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; color: #cbd5e1; line-height: 1.65; text-align: left;">
                      {{contenido}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- BODY TO DIVIDER SEPARATION (24px) -->
            <tr>
              <td>
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td height="24" style="font-size: 0px; line-height: 0px; height: 24px;">&nbsp;</td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- DIVIDER -->
            <tr>
              <td style="padding: 0 32px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td height="1"
                      style="background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%); font-size: 0px; line-height: 0px;">
                      &nbsp;</td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- DIVIDER TO FOOTER SEPARATION (24px) -->
            <tr>
              <td>
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td height="24" style="font-size: 0px; line-height: 0px; height: 24px;">&nbsp;</td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- FOOTER SECTION -->
            <tr>
              <td align="center" valign="top" style="padding: 0 32px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td align="center"
                      style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; color: #64748b; line-height: 1.6;">
                      {{siteName}} &mdash; {{slogan}}
                    </td>
                  </tr>
                  <tr>
                    <td height="4" style="font-size: 0px; line-height: 0px; height: 4px;">&nbsp;</td>
                  </tr>
                  <tr>
                    <td align="center"
                      style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; color: #475569; line-height: 1.6;">
                      <a href="https://<domain>" target="_blank" style="color: #818cf8; text-decoration: none;">
                        <domain>
                      </a> &middot; <a href="mailto:soporte@<domain>"
                        style="color: #818cf8; text-decoration: none;">soporte@<domain></a>
                    </td>
                  </tr>
                  <tr>
                    <td height="4" style="font-size: 0px; line-height: 0px; height: 4px;">&nbsp;</td>
                  </tr>
                  <tr>
                    <td align="center"
                      style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; color: #64748b; line-height: 1.6;">
                      <a href="https://<domain>/legal/terms" target="_blank"
                        style="color: #64748b; text-decoration: none;">{{terminosLabel}}</a> &middot; <a
                        href="https://<domain>/legal/privacy" target="_blank"
                        style="color: #64748b; text-decoration: none;">{{privacidadLabel}}</a>
                    </td>
                  </tr>
                  <tr>
                    <td height="12" style="font-size: 0px; line-height: 0px; height: 12px;">&nbsp;</td>
                  </tr>
                  <tr>
                    <td align="center"
                      style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; color: #475569; letter-spacing: 1px;">
                      &copy; 2026 {{siteName}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- BOTTOM SPACING -->
            <tr>
              <td>
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td height="32" style="font-size: 0px; line-height: 0px; height: 32px;">&nbsp;</td>
                  </tr>
                </table>
              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>
  </div>
</body>

</html>
