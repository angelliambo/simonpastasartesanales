app = "simonpastasartesanales"

[build]
  dockerfile = "../../Dockerfile"
  [build.args]
    REACT_APP_API_URL = "https://simonpastasartesanales.com.ar/api"
    REACT_APP_GOOGLE_CLIENT_ID = "<google-client-id>"
primary_region = "gru"

[env]
HOSTNAME = "0.0.0.0"
NODE_ENV = "production"
PORT = "5000"
# ⚠️ IMPORTANTE: Actualizar con la URL de tu app en Fly.io
FRONTEND_URL = "https://simonpastasartesanales.com.ar"
LOG_LEVEL = "info"
LOG_REQUESTS = "true"
LOG_ERRORS = "true"
ENABLE_REQUEST_LOGGING = "false"
ENABLE_ERROR_LOGGING = "true"
ENABLE_DETAILED_ERRORS = "false"

[http_service]
auto_start_machines = true
auto_stop_machines = false
force_https = true
internal_port = 80
min_machines_running = 1

[[statics]]
guest_path = "/app/build"
tigris_bucket = ""
url_prefix = "/"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 1024
