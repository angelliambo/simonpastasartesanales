<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpiar Service Worker - SaaS Boilerplate Portal</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; background: #0b091a; color: #fff; }
    pre { background: #1a1a3e; padding: 16px; border-radius: 8px; display: inline-block; text-align: left; }
  </style>
</head>
<body>
  <h1>🧹 Limpiando Service Worker...</h1>
  <pre id="log"></pre>
  <script>
    const log = document.getElementById("log");
    function logMsg(msg) { log.textContent += msg + "\\n"; }
    (async () => {
      logMsg("Eliminando caches...");
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      logMsg("Caches eliminados: " + keys.length);
      logMsg("Deregistrando service workers...");
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      logMsg("SW deregistrados: " + regs.length);
      logMsg("✅ Listo. Recargando...");
      setTimeout(() => location.reload(), 1500);
    })();
  </script>
</body>
</html>
