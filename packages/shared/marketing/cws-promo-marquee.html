<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CWS Marquee Tile (1400x560)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;955&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style-global.css">
  <style>
    body {
      background-color: #050508;
    }

    .canvas.cws-marquee {
      width: 100%;
      max-width: 1400px;
      height: auto;
      aspect-ratio: 1400 / 560;
      max-height: 560px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #09090e;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      position: relative;
      overflow: hidden;
      padding: 0;
    }

    .glow-1 {
      top: -30%;
      left: 10%;
      width: 800px;
      height: 800px;
      filter: blur(80px);
      background: radial-gradient(circle, rgba(96, 165, 250, 0.25) 0%, transparent 70%);
    }

    .glow-2 {
      bottom: -30%;
      right: 15%;
      width: 900px;
      height: 900px;
      filter: blur(95px);
      background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, transparent 70%);
    }

    .glow-3 {
      top: 15%;
      right: -10%;
      width: 600px;
      height: 600px;
      filter: blur(80px);
      background: radial-gradient(circle, rgba(244, 114, 182, 0.15) 0%, transparent 70%);
    }

    .visual-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* Giant orbital lines */
    .orbital-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .orbit-1 {
      width: 450px;
      height: 450px;
      border-style: dashed;
      animation: rotate-clockwise 60s linear infinite;
    }

    .orbit-2 {
      width: 650px;
      height: 650px;
      animation: rotate-counter 90s linear infinite;
    }

    .orbit-3 {
      width: 850px;
      height: 850px;
      border-style: dotted;
      animation: rotate-clockwise 120s linear infinite;
    }

    @keyframes rotate-clockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes rotate-counter {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    /* Floating Showcase Glass Card */
    .showcase-card {
      position: relative;
      z-index: 3;
      width: 280px;
      height: 280px;
      border-radius: 48px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5),
                  inset 0 1px 0 rgba(255, 255, 255, 0.15),
                  0 0 80px rgba(96, 165, 250, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float-main 6s ease-in-out infinite;
    }

    .logo-marquee {
      width: 170px;
      height: 170px;
      object-fit: contain;
      filter: drop-shadow(0 15px 30px rgba(96, 165, 250, 0.3));
    }

    @keyframes float-main {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }

    /* Floating Feature Icons */
    .floating-icon {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      color: #ffffff;
    }

    .floating-icon svg {
      width: 48px;
      height: 48px;
    }

    .icon-left {
      left: 20%;
      top: 30%;
      border-color: rgba(96, 165, 250, 0.3);
      color: var(--primary);
      box-shadow: 0 15px 35px rgba(96, 165, 250, 0.15);
      animation: float-left 7s ease-in-out infinite;
    }

    .icon-right {
      right: 20%;
      bottom: 25%;
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--tertiary);
      box-shadow: 0 15px 35px rgba(168, 85, 247, 0.15);
      animation: float-right 8s ease-in-out infinite;
    }

    @keyframes float-left {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    @keyframes float-right {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(20px) scale(0.95); }
    }

    /* Siri-style glowing waveform at the bottom */
    .waveform-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      opacity: 0.8;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
    }

    .wave-svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="canvas cws-marquee">
    <div class="aurora glow-1"></div>
    <div class="aurora glow-2"></div>
    <div class="aurora glow-3"></div>
    
    <div class="visual-wrapper">
      <div class="orbital-ring orbit-1"></div>
      <div class="orbital-ring orbit-2"></div>
      <div class="orbital-ring orbit-3"></div>
      
      <!-- Left icon (Microphone / STT) -->
      <div class="floating-icon icon-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
          <line x1="12" x2="12" y1="19" y2="22"/>
        </svg>
      </div>

      <!-- Center Showcase Card (Logo) -->
      <div class="showcase-card">
        <img src="logo.png" class="logo-marquee" alt="ZenithNexus Logo">
      </div>

      <!-- Right icon (Speaker / Sound / TTS) -->
      <div class="floating-icon icon-right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </div>
    </div>

    <!-- Glowing wave visualizer lines -->
    <div class="waveform-container">
      <svg class="wave-svg" viewBox="0 0 1440 120" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,80 C240,120 480,40 720,80 C960,120 1200,40 1440,80 L1440,120 L0,120 Z" fill="url(#gradient-wave-1)" opacity="0.3"/>
        <path d="M0,60 C300,100 600,20 900,80 C1200,140 1350,60 1440,40 L1440,120 L0,120 Z" fill="url(#gradient-wave-2)" opacity="0.2"/>
        <defs>
          <linearGradient id="gradient-wave-1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#f472b6" stop-opacity="0.8"/>
          </linearGradient>
          <linearGradient id="gradient-wave-2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#34d399" stop-opacity="0.6"/>
            <stop offset="70%" stop-color="#60a5fa" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#c084fc" stop-opacity="0.6"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

</body>
</html>
